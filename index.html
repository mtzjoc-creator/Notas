<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apoyo Nani</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#2a0a1f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Apoyo Nani"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#2a0a1f;--paper:#fff0f6;--accent:#e91e8c;--accent2:#c2185b;--gold:#f48fb1;--muted:#a07080;--card:#fff;--border:#f8c8dc;--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);font-family:'Space Mono',monospace;color:var(--ink);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--paper);z-index:50;border-bottom:2px solid var(--ink)}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
.logo-text span{color:var(--accent)}
.badge{background:var(--ink);color:var(--paper);font-size:11px;font-family:'Syne',sans-serif;font-weight:700;padding:4px 10px;border-radius:20px}

/* API KEY BANNER */
#key-banner{background:#fff3cd;border-bottom:2px solid #f5c842;padding:10px 16px;display:none;align-items:center;gap:8px;flex-wrap:wrap}
#key-banner.show{display:flex}
#key-banner span{font-size:12px;flex:1}
#key-input{border:1.5px solid var(--ink);border-radius:8px;padding:6px 10px;font-size:11px;font-family:'Space Mono',monospace;flex:1;min-width:160px}
#key-save{background:var(--ink);color:var(--paper);border:none;border-radius:8px;padding:6px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap}

/* SESIÓN DE FOTOS */
.session-section{padding:14px 16px 0}
.sec-label{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1.5px;background:var(--border)}

.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;transition:.15s}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumb.selected{border-color:var(--accent)}
.photo-thumb .check{position:absolute;top:4px;right:4px;width:20px;height:20px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.photo-thumb.selected .check{display:flex}
.photo-thumb .del{position:absolute;top:4px;left:4px;width:18px;height:18px;background:rgba(0,0,0,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;border:none;cursor:pointer;opacity:0;transition:.15s}
.photo-thumb:hover .del{opacity:1}
.photo-thumb .del:active{opacity:1}

.add-photo-btn{aspect-ratio:1;border-radius:10px;border:2px dashed var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;transition:.15s}
.add-photo-btn:hover{border-color:var(--accent);background:var(--paper)}
.add-photo-btn span{font-size:22px}
.add-photo-btn p{font-size:9px;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;text-align:center}

.session-empty{text-align:center;padding:24px 16px;color:var(--muted);font-size:12px;border:2px dashed var(--border);border-radius:var(--radius);background:var(--card);cursor:pointer;transition:.15s}
.session-empty:hover{border-color:var(--accent)}
.session-empty .e{font-size:36px;display:block;margin-bottom:8px}

.sel-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:12px;color:var(--muted)}
.sel-bar strong{color:var(--accent);font-family:'Syne',sans-serif}
.sel-actions{display:flex;gap:6px}
.sel-btn{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;background:none;border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;transition:.15s}
.sel-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.sel-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}

/* TIPO Y BOTÓN */
.type-row{display:flex;gap:7px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-top:12px}
.type-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 13px;border-radius:20px;border:2px solid var(--border);background:var(--card);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:.15s;white-space:nowrap}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip:hover:not(.active){border-color:var(--ink)}

.proc-section{padding:12px 16px}
.proc-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:'Syne',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.proc-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(233,30,140,.35)}
.proc-btn:disabled{opacity:.5;cursor:not-allowed}
.spin{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTADO */
.result-card{margin:0 16px 14px;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);overflow:hidden;animation:up .35s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.res-header{background:var(--ink);color:var(--paper);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.res-badge{background:var(--accent);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px}
.res-body{padding:14px;line-height:1.7;font-size:13px;max-height:48vh;overflow-y:auto}
.res-body h2{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-bottom:10px;color:var(--accent);border-bottom:2px solid var(--border);padding-bottom:7px}
.res-body h3{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin:12px 0 5px;color:var(--accent2)}
.res-body ul{padding-left:16px;margin:5px 0}
.res-body li{margin-bottom:4px}
.res-body .tag{display:inline-block;background:var(--gold);color:var(--ink);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;margin:2px 2px 2px 0;font-family:'Syne',sans-serif}
.res-body .box{background:var(--paper);border-left:4px solid var(--accent);padding:9px 12px;border-radius:0 8px 8px 0;margin:9px 0;font-size:12px}
.res-body .mn{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--accent)}
.dot.b{background:var(--accent2)}.dot.g{background:var(--gold)}
.res-actions{padding:10px 14px;border-top:1.5px solid var(--border);display:flex;gap:7px;flex-wrap:wrap}
.act-btn{padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);background:transparent;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.act-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.act-btn.p{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.act-btn.word{background:#1e4fff;color:#fff;border-color:#1e4fff}
.act-btn.word:hover{background:#1640cc}

/* CUADERNO */
.nb-section{padding:0 16px 30px}
.note-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:.15s;display:flex;align-items:flex-start;gap:10px}
.note-item:hover{border-color:var(--ink);transform:translateX(3px)}
.nthumb{width:40px;height:40px;border-radius:8px;flex-shrink:0;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.nthumb img{width:100%;height:100%;object-fit:cover}
.nmeta{flex:1;min-width:0}
.ntitle{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nsub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.nbadge{background:var(--paper);border:1px solid var(--border);padding:1px 5px;border-radius:6px;font-size:10px;font-family:'Syne',sans-serif;font-weight:700;color:var(--accent)}
.note-acts{display:flex;gap:3px;margin-left:auto;align-items:center}
.nbtn{background:none;border:none;font-size:14px;cursor:pointer;opacity:.4;padding:4px}
.nbtn:hover{opacity:1}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;z-index:999;transition:.3s cubic-bezier(.16,1,.3,1);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="app">

  <!-- API KEY BANNER -->
  <div id="key-banner">
    <span>🔑 Ingresa tu API Key de Anthropic para activar la IA</span>
    <input id="key-input" type="password" placeholder="sk-ant-..."/>
    <button id="key-save" onclick="saveKey()">Guardar</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📸</div>
      <div class="logo-text">Apoyo <span>Nani</span></div>
    </div>
    <div class="badge" id="cnt">0 notas</div>
  </div>

  <!-- SESIÓN DE FOTOS -->
  <div class="session-section">
    <div class="sec-label">Sesión de fotos</div>
    <div id="photo-area"></div>
    <div class="sel-bar" id="sel-bar" style="display:none">
      <span><strong id="sel-count">0</strong> foto(s) seleccionadas</span>
      <div class="sel-actions">
        <button class="sel-btn" onclick="selectAll()">Todas</button>
        <button class="sel-btn" onclick="clearSelection()">Ninguna</button>
        <button class="sel-btn danger" onclick="clearSession()">🗑 Limpiar</button>
      </div>
    </div>
  </div>

  <!-- TIPO -->
  <div class="type-row" id="types"></div>

  <!-- BOTÓN GENERAR -->
  <div class="proc-section">
    <button class="proc-btn" id="pbtn" disabled onclick="process()">
      📷 Selecciona fotos para generar
    </button>
  </div>

  <!-- RESULTADO -->
  <div id="result"></div>

  <!-- CUADERNO -->
  <div class="nb-section">
    <div class="sec-label" style="margin-bottom:10px">Mi Cuaderno</div>
    <div id="nb">
      <div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">
        <div style="font-size:32px;margin-bottom:8px">📓</div>
        Tu cuaderno está vacío.<br/>Genera y guarda tu primera nota.
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fi" accept="image/*" capture="environment" multiple/>

<script>
// ─── CONFIG ───────────────────────────────
const TYPES=[
  {id:"summary",  icon:"📄",label:"Resumen"},
  {id:"mindmap",  icon:"🧠",label:"Mapa Mental"},
  {id:"schema",   icon:"📊",label:"Esquema"},
  {id:"poster",   icon:"🎯",label:"Cartel"},
  {id:"flashcard",icon:"⚡",label:"Flashcards"},
  {id:"outline",  icon:"📋",label:"Índice"},
];
const PROMPTS={
  summary:"Analiza TODAS las imágenes adjuntas (son fotos de una misma clase/exposición) y genera un RESUMEN integrado del contenido completo.",
  mindmap:"Analiza TODAS las imágenes adjuntas y genera un MAPA MENTAL integrado con todos los conceptos visibles.",
  schema:"Analiza TODAS las imágenes adjuntas y genera un ESQUEMA jerárquico integrado del contenido completo.",
  poster:"Analiza TODAS las imágenes adjuntas y genera un CARTEL con los puntos clave de toda la sesión.",
  flashcard:"Analiza TODAS las imágenes adjuntas y genera FLASHCARDS de estudio con el contenido completo de la sesión.",
  outline:"Analiza TODAS las imágenes adjuntas y genera un ÍNDICE estructurado de todos los temas visibles.",
};
const SYS=`Eres un asistente experto en análisis visual de contenido educativo.
El usuario te enviará una o más imágenes de la misma clase o exposición (pueden ser fotos de pizarrón, diapositivas, apuntes, etc.).
Extrae e integra TODA la información de TODAS las imágenes y genera el tipo de salida solicitado como un documento cohesivo y completo.
- RESUMEN: Párrafo integrado (máx 150 palabras). Usa **negrita** para conceptos clave.
- MAPA MENTAL: ## Tema Central, luego ### Ramas principales con sus sub-ideas.
- ESQUEMA: Estructura jerárquica numerada (I. > A. > 1.) integrando todo el contenido.
- CARTEL: Título llamativo, 4-6 puntos clave, #hashtags temáticos al final.
- FLASHCARDS: 5-8 pares **Q:** ... / **A:** ... cubriendo los temas más importantes.
- ÍNDICE: Lista ordenada de temas y subtemas como tabla de contenido completa.
Responde SIEMPRE en español. Integra la información de todas las imágenes como si fueran una sola sesión.`;

// ─── STATE ────────────────────────────────
let sel="summary";
let photos=[]; // {id, file, url, b64, selected}
let last=null, lastTitle="Nota";
let nb=JSON.parse(localStorage.getItem("apoyo_nani")||"[]");

// ─── INIT ─────────────────────────────────
function init(){
  renderTypes();renderNb();updCnt();checkKey();
  document.getElementById("fi").onchange=onFileChange;
}

// ─── API KEY ──────────────────────────────
function checkKey(){
  const k=localStorage.getItem("apoyo_nani_key")||"";
  if(!k) document.getElementById("key-banner").classList.add("show");
}
function saveKey(){
  const k=document.getElementById("key-input").value.trim();
  if(!k){toast("⚠️ Ingresa una key válida");return;}
  localStorage.setItem("apoyo_nani_key",k);
  document.getElementById("key-banner").classList.remove("show");
  toast("🔑 API Key guardada");
}
function getKey(){return localStorage.getItem("apoyo_nani_key")||"";}

// ─── FOTOS ────────────────────────────────
function onFileChange(e){
  const files=Array.from(e.target.files||[]);
  files.forEach(f=>{
    const url=URL.createObjectURL(f);
    const id=Date.now()+Math.random();
    photos.push({id,file:f,url,b64:null,selected:false});
  });
  document.getElementById("fi").value="";
  renderPhotos();
}

async function getB64(photo){
  if(photo.b64) return photo.b64;
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{photo.b64=r.result.split(",")[1];res(photo.b64);};
    r.onerror=rej;
    r.readAsDataURL(photo.file);
  });
}

function togglePhoto(id){
  const p=photos.find(x=>x.id===id);
  if(p){p.selected=!p.selected;}
  renderPhotos();
}

function removePhoto(id){
  const p=photos.find(x=>x.id===id);
  if(p) URL.revokeObjectURL(p.url);
  photos=photos.filter(x=>x.id!==id);
  renderPhotos();
}

function selectAll(){
  photos.forEach(p=>p.selected=true);
  renderPhotos();
}
function clearSelection(){
  photos.forEach(p=>p.selected=false);
  renderPhotos();
}
function clearSession(){
  photos.forEach(p=>URL.revokeObjectURL(p.url));
  photos=[];
  renderPhotos();
}

function renderPhotos(){
  const area=document.getElementById("photo-area");
  const selBar=document.getElementById("sel-bar");
  const selCount=document.getElementById("sel-count");
  const selected=photos.filter(p=>p.selected);

  if(photos.length===0){
    area.innerHTML=`<div class="session-empty" onclick="document.getElementById('fi').click()">
      <span class="e">📷</span>
      Toca para agregar fotos de tu clase o exposición.<br/>
      <span style="font-size:10px;margin-top:4px;display:block">Puedes agregar varias y elegir cuáles usar</span>
    </div>`;
    selBar.style.display="none";
  } else {
    const grid=photos.map(p=>`
      <div class="photo-thumb ${p.selected?'selected':''}" onclick="togglePhoto(${p.id})">
        <img src="${p.url}" loading="lazy"/>
        <div class="check">✓</div>
        <button class="del" onclick="event.stopPropagation();removePhoto(${p.id})">✕</button>
      </div>`).join("");
    area.innerHTML=`<div class="photo-grid">
      ${grid}
      <div class="add-photo-btn" onclick="document.getElementById('fi').click()">
        <span>➕</span><p>Más fotos</p>
      </div>
    </div>`;
    selBar.style.display="flex";
    selCount.textContent=selected.length;
  }

  updBtn(selected.length);
}

// ─── TIPOS ────────────────────────────────
function renderTypes(){
  document.getElementById("types").innerHTML=TYPES.map(t=>
    `<button class="chip ${t.id===sel?'active':''}" onclick="selType('${t.id}')">${t.icon} ${t.label}</button>`
  ).join("");
}
function selType(id){sel=id;renderTypes();updBtn(photos.filter(p=>p.selected).length);}

function updBtn(selCount){
  const b=document.getElementById("pbtn"),t=TYPES.find(x=>x.id===sel);
  b.disabled=selCount===0;
  b.innerHTML=selCount>0
    ? `${t.icon} Generar ${t.label} (${selCount} foto${selCount>1?'s':''})`
    : `📷 Selecciona fotos para generar`;
}

// ─── PROCESAR ─────────────────────────────
async function process(){
  const selected=photos.filter(p=>p.selected);
  if(!selected.length){toast("📷 Selecciona al menos una foto");return;}
  const key=getKey();
  if(!key){
    document.getElementById("key-banner").classList.add("show");
    toast("🔑 Ingresa tu API Key primero");return;
  }

  const b=document.getElementById("pbtn");
  b.disabled=true;
  b.innerHTML=`<div class="spin"></div> Analizando ${selected.length} foto(s)…`;

  try{
    const imgBlocks=[];
    for(const p of selected){
      const b64=await getB64(p);
      imgBlocks.push({
        type:"image",
        source:{type:"base64",media_type:p.file.type||"image/jpeg",data:b64}
      });
    }
    imgBlocks.push({type:"text",text:PROMPTS[sel]});

    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01"
      },
      body:JSON.stringify({
        model:"claude-3-5-sonnet-20241022",
        max_tokens:1500,
        system:SYS,
        messages:[{role:"user",content:imgBlocks}]
      })
    });

    const d=await res.json();
    if(d.error){
      toast("❌ " + (d.error.message || "Error de API"));
    } else {
      const txt=(d.content||[]).map(c=>c.text||"").join("\n").trim();
      txt?renderResult(txt):toast("⚠️ Sin respuesta. Intenta de nuevo.");
    }
  }catch(e){
    toast("❌ Error de conexión. Revisa tu red.");
  }
  updBtn(photos.filter(p=>p.selected).length);
}

// ─── RESULTADO ────────────────────────────
function renderResult(txt){
  last=txt;
  const t=TYPES.find(x=>x.id===sel);
  const now=new Date();
  const selCount=photos.filter(p=>p.selected).length;
  lastTitle=`${t.label} — ${now.toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'})}`;
  document.getElementById("result").innerHTML=`
    <div class="result-card">
      <div class="res-header">
        <span>✨ ${selCount} foto(s) analizadas</span>
        <span class="res-badge">${t.icon} ${t.label}</span>
      </div>
      <div class="res-body">${md(txt)}</div>
      <div class="res-actions">
        <button class="act-btn p" onclick="save()">💾 Guardar</button>
        <button class="act-btn word" onclick="exportWord(last,lastTitle)">📝 Word</button>
        <button class="act-btn" onclick="copy()">📋 Copiar</button>
      </div>
    </div>`;
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
}

// ─── WORD EXPORT ──────────────────────────
function exportWord(content,title){
  const body=content
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^#+ (.+)$/gm,'<h2>$1</h2>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`);
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:w="urn:schemas-microsoft-com:office:word"
    xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="utf-8"/><title>${title}</title>
  <style>
    body{font-family:Calibri,sans-serif;font-size:11pt;margin:2.5cm;color:#1a1a2e}
    h1{color:#e91e8c;font-size:20pt;margin-bottom:12pt;border-bottom:2pt solid #f8c8dc;padding-bottom:6pt}
    h2{color:#c2185b;font-size:14pt;margin:14pt 0 6pt}
    h3{color:#880e4f;font-size:12pt;margin:10pt 0 4pt}
    ul{margin-left:18pt}li{margin-bottom:4pt}
    blockquote{border-left:4pt solid #e91e8c;padding-left:10pt;margin:8pt 0;color:#666}
  </style></head>
  <body>
    <h1>📸 Apoyo Nani — ${title}</h1>
    ${body}
    <p style="margin-top:24pt;font-size:9pt;color:#aaa">Generado con Apoyo Nani · ${new Date().toLocaleString('es')}</p>
  </body></html>`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff',html],{type:'application/msword'}));
  a.download=`${title}.doc`;a.click();
  URL.revokeObjectURL(a.href);
  toast("📝 Descargando Word…");
}

// ─── GUARDAR ──────────────────────────────
function save(){
  if(!last)return;
  const t=TYPES.find(x=>x.id===sel),now=new Date();
  const firstPhoto=photos.find(p=>p.selected);
  nb.unshift({
    id:Date.now(),
    title:`${t.icon} ${now.toLocaleDateString('es',{day:'2-digit',month:'short'})} ${now.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}`,
    date:now.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),
    type:sel,content:last,
    img:firstPhoto?firstPhoto.url:null,
    photoCount:photos.filter(p=>p.selected).length
  });
  localStorage.setItem("apoyo_nani",JSON.stringify(nb));
  renderNb();updCnt();toast("💾 Guardado en tu cuaderno");
}

function copy(){navigator.clipboard?.writeText(last||"");toast("📋 Copiado");}

// ─── CUADERNO ─────────────────────────────
function renderNb(){
  const el=document.getElementById("nb");
  if(!nb.length){
    el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px"><div style="font-size:32px;margin-bottom:8px">📓</div>Tu cuaderno está vacío.<br/>Genera y guarda tu primera nota.</div>`;
    return;
  }
  el.innerHTML=nb.map(n=>{
    const t=TYPES.find(x=>x.id===n.type);
    const th=`<div class="nthumb">📸</div>`;
    const photos=n.photoCount>1?`<span class="nbadge">${n.photoCount} fotos</span>`:'';
    return `<div class="note-item" onclick="openNote(${n.id})">
      ${th}
      <div class="nmeta">
        <div class="ntitle">${n.title}</div>
        <div class="nsub"><span>${n.date}</span><span class="nbadge">${t?.icon} ${t?.label}</span>${photos}</div>
      </div>
      <div class="note-acts">
        <button class="nbtn" title="Word" onclick="event.stopPropagation();exportNoteWord(${n.id})">📝</button>
        <button class="nbtn" onclick="event.stopPropagation();delNote(${n.id})">🗑</button>
      </div>
    </div>`;
  }).join("");
}

function exportNoteWord(id){
  const n=nb.find(x=>x.id===id);if(!n)return;
  const t=TYPES.find(x=>x.id===n.type);
  exportWord(n.content,`${t?.label||'Nota'} — ${n.title}`);
}

function openNote(id){
  const n=nb.find(x=>x.id===id);if(!n)return;
  const t=TYPES.find(x=>x.id===n.type);
  last=n.content;lastTitle=`${t?.label||'Nota'} — ${n.title}`;
  document.getElementById("result").innerHTML=`
    <div class="result-card">
      <div class="res-header"><span>${n.title}</span><span class="res-badge">${t?.icon} ${t?.label}</span></div>
      <div class="res-body">${md(n.content)}</div>
      <div class="res-actions">
        <button class="act-btn word" onclick="exportWord(last,lastTitle)">📝 Word</button>
        <button class="act-btn" onclick="copy()">📋 Copiar</button>
        <button class="act-btn" onclick="document.getElementById('result').innerHTML=''">✕ Cerrar</button>
      </div>
    </div>`;
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
}

function delNote(id){
  nb=nb.filter(n=>n.id!==id);
  localStorage.setItem("apoyo_nani",JSON.stringify(nb));
  renderNb();updCnt();toast("🗑 Nota eliminada");
}
function updCnt(){document.getElementById("cnt").textContent=`${nb.length} nota${nb.length!==1?'s':''}`;}

// ─── MARKDOWN ─────────────────────────────
function md(t){
  return t
    .replace(/\*\*(.*?)\*\"/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^#+ (.+)$/gm,'<h2>$1</h2>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/^> (.+)$/gm,'<div class="box">$1</div>')
    .replace(/#(\w+)/g,'<span class="tag">#$1</span>')
    .replace(/\*\*Q:\*\* (.+)/g,'<div class="mn"><div class="dot b"></div><div><strong>❓ $1</strong></div></div>')
    .replace(/\*\*A:\*\* (.+)/g,'<div class="mn"><div class="dot g"></div><div>✅ $1</div></div>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>`<ul>${m}</ul>`);
}

// ─── TOAST ────────────────────────────────
let tt;
function toast(m){
  const e=document.getElementById("toast");
  e.textContent=m;e.classList.add("show");
  clearTimeout(tt);tt=setTimeout(()=>e.classList.remove("show"),2800);
}

// ─── SERVICE WORKER ───────────────────────
if("serviceWorker" in navigator)
  navigator.serviceWorker.register("./sw.js").catch(()=>{});

init();
</script>
</body>
</html>
